# Head camera hand-eye calibration config
# load_calib_config() 가 기본으로 읽는 packaged YAML

board:
  cols: 5
  rows: 7
  square_len: 0.04015       # [m] 체스보드 사각형 한 변
  marker_len: 0.032      # [m] ArUco 마커 한 변
  marker_dict: "DICT_6X6_250"

camera_source:
  mode: "server"              # "server" | "direct"
  name: "head"                # camera_server.yaml 의 cameras[].name 과 일치해야 함
  address: "tcp://127.0.0.1:5550"
  prefix: "rby1"

realsense:                    # mode: "direct" 시 사용
  serial_number: null
  color_width: 1280
  color_height: 720
  fps: 30
  enable_depth: false
  align_depth_to_color: false
  warmup_frames: 5

robot:
  head_link: "link_head_2"

output_dir: "outputs"
min_samples: 3

home:
  head: [0.0, -0.4]                                              # [yaw, pitch] rad
  torso: [1.89849107e-05, 1.04723426e+00, -1.57075836e+00,
          7.85390569e-01, 7.59396430e-06, 0.0]                 # 6-DOF rad

auto_capture:
  yaw_range: 0.     # [rad] home yaw 기준 ±범위
  pitch_range: 0.   # [rad] home pitch 기준 ±범위
  head_minimum_time: 0.5    # [s] head 이동 시간
  torso_minimum_time: 3.0   # [s] torso 이동 시간
  torso_noise:      # joint_index: half-range [rad]
    0: 0.2
    1: 0.2
    2: 0.2
    3: 0.3
    4: 0.5
    5: 0.5


