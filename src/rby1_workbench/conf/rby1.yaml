# RBY1 로봇 기본 설정
# load_rby1_config()가 기본으로 읽는 packaged YAML
# cfg = load_rby1_config("path/to/custom_rby1.yaml") 로 사용자 YAML merge 가능

address: "192.168.12.1:50051"
model: "m"
power_pattern: ".*"
servo_pattern: ".*"
unlimited_mode: true
state_update_hz: 100.0

stream:
  dt: 0.1                          # 제어 주기 [s]
  torso_mode: "joint_position"     # joint_position | cartesian_impedance
  right_arm_mode: "cartesian_impedance"
  left_arm_mode: "cartesian_impedance"

cartesian_impedance:
  # 팔 (7-DOF) — VR teleop 기본값
  arm_stiffness: [80.0, 80.0, 80.0, 80.0, 80.0, 80.0, 40.0]
  arm_torque_limit: [30.0, 30.0, 30.0, 30.0, 30.0, 30.0, 30.0]
  arm_linear_velocity_limit: 2.0
  arm_angular_velocity_limit: 6.2831853   # 2*pi
  arm_linear_accel_limit: 20.0
  arm_angular_accel_limit: 251.327412     # 80*pi

  # 토르소 (6-DOF) — VR teleop 기본값
  torso_stiffness: [400.0, 400.0, 400.0, 400.0, 400.0, 400.0]
  torso_torque_limit: [500.0, 500.0, 500.0, 500.0, 500.0, 500.0]
  torso_linear_velocity_limit: 1.0
  torso_angular_velocity_limit: 1.5707963  # pi/2
  torso_linear_accel_limit: 10.0
  torso_angular_accel_limit: 62.8318530    # 20*pi

  # 관절 리밋 — VR teleop 하드코딩 값
  joint_limits:
    right_arm_3: [-2.6, -0.5]
    right_arm_5: [0.2, 1.9]
    left_arm_3: [-2.6, -0.5]
    left_arm_5: [0.2, 1.9]
    torso_1: [-0.523598776, 1.3]
    torso_2: [-2.617993878, -0.2]

gripper:
  enabled: false
  tool_flange_voltage: 12
  tcp_host: "0.0.0.0"
  tcp_port: 5000

calib:
  output_dir: "outputs"   # 교정 결과 저장/로드 디렉토리
  auto_load: true          # connect() 시 가장 최근 교정 결과 자동 등록
