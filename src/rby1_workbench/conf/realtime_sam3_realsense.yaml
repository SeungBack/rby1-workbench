realsense:
  serial_number: null
  color_width: 640
  color_height: 480
  depth_width: 640
  depth_height: 480
  fps: 30
  enable_depth: true
  align_depth_to_color: true
  warmup_frames: 15

sam3:
  checkpoint_path: null
  device: "auto"
  resolution: 320
  confidence_threshold: 0.5
  interactive_multimask_output: false
  enable_compile: true
  enable_autocast: true
  autocast_dtype: "bfloat16"

visualizer:
  window_name: "RealSense SAM3"
  mask_alpha: 0.45
  point_radius: 6
  box_thickness: 2
  show_help: false
  show_depth: false
  depth_hconcat: false
  depth_preview_size: 180
  font_scale: 0.5
  line_height: 18
  wait_key_ms: 1
  initial_window_width: 1600
  initial_window_height: 900

initial_text_prompt: ""
