robot:
  address: "192.168.12.1:50051"
  model: "m"
  urdf_path: "/home/kimm/Workspaces/rby1-sdk/models/rby1m/urdf/model_v1.2.urdf"
  kinematics:
    flip_joints: ["head_1"]  # physical axis opposed to URDF declaration
  power: ".*"
  servo: ".*"
  auto_power_on: false
  auto_servo_on: false
  auto_enable_control_manager: false
  unlimited_mode_enabled: false
  state_update_hz: 10.0

calib:
  output_dir: "outputs"      # 절대경로 또는 repo root 기준 상대경로
  auto_load: true

camera_source:
  mode: "server"              # "server" | "direct"
  name: "head"
  address: "tcp://127.0.0.1:5550"
  prefix: "rby1"

realsense:                    # mode: "direct" 시 카메라 설정 / pointcloud 파라미터는 항상 참조
  serial_number: null
  color_width: 1280
  color_height: 720
  depth_width: 1280
  depth_height: 720
  fps: 30
  enable_depth: true
  align_depth_to_color: true
  warmup_frames: 5
  pointcloud_stride: 1        # 픽셀 샘플링 간격 (클수록 포인트 수 감소)
  pointcloud_max_depth_m: 3.0 # 이 거리 이상은 제외

viz:
  application_id: "rby1_visualize_robot"
  spawn_viewer: true
  world_frame: "world"
  arrow_length_m: 0.08
  log_robot_frames: true
  log_head_frames: true
  log_joint_scalars: true
  log_skeletons: true
  log_meshes: true
  state_update_hz: 10.0
  mesh_dir: null
